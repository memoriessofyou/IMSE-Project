<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Norwegian Learning App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 1.4rem;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 0.95rem;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .card {
            background: white;
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .card h2 {
            margin-bottom: 15px;
            font-size: 1.1rem;
            color: #2c3e50;
        }

        select, button {
            padding: 8px 14px;
            font-size: 0.95rem;
            border-radius: 5px;
            border: 1px solid #ccc;
            margin-right: 10px;
        }

        button {
            background-color: #2c3e50;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #3d5166;
        }

        .status {
            margin-top: 12px;
            font-size: 0.9rem;
            color: #27ae60;
        }

        .error {
            color: #e74c3c;
        }

        /* REVIEW MODAL STYLES */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 400px;
            max-width: 90%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 1.5rem;
            cursor: pointer;
            color: #999;
        }

        .review-word {
            font-size: 2rem;
            text-align: center;
            margin: 20px 0;
            color: #2c3e50;
            font-weight: bold;
        }

        .review-translation {
            display: none;
            font-size: 1.4rem;
            text-align: center;
            margin-bottom: 25px;
            color: #27ae60;
        }

        .review-actions {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn-success { background-color: #27ae60; }
        .btn-danger { background-color: #e74c3c; }
    </style>
</head>
<body>

<header>
    <h1>🇳🇴 Norwegian Learning App</h1>
    <nav>
        <a href="#seed-section">Seed Data</a>
        <a href="#user-section">Select User</a>
        <a href="#usecases-section">Use Cases</a>
    </nav>
</header>

<div class="container">

    <!-- SEED SECTION -->
    <div class="card" id="seed-section">
        <h2>Database Management</h2>
        <button onclick="seedDatabase()">Generate Random Data</button>
        <p class="status" id="seed-status"></p>
    </div>

    <!-- USER SELECTOR -->
    <div class="card" id="user-section">
        <h2>Select User</h2>
        <select id="user-select" onchange="selectUser()">
            <option value="">-- Select a user --</option>
        </select>
        <p class="status" id="user-status"></p>
    </div>

    <!-- USE CASES -->
    <div class="card" id="usecases-section">
        <h2>Use Cases</h2>
        <button onclick="toggleReviewModal()">
            Word Review (Anna)
        </button>
        <button onclick="window.location.href='assign-wordlist.html'">
            Assign Wordlist (Anastasiia)
        </button>
        <button onclick="window.location.href='wordlist-words.html'">
            Add Word to Wordlist (Ines)
        </button>
    </div>

</div>

<!-- REVIEW MODAL -->
<div id="review-modal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeReviewModal()">&times;</span>
        <h2 style="text-align: center; margin-bottom: 10px;">Review Session</h2>
        <div id="review-content">
            <!-- Dynamic content from review.js -->
        </div>
    </div>
</div>

<script src="review.js"></script>
<script>
    let selectedUser = null;

    // Load users into dropdown on page load
    async function loadUsers() {
        try {
            const res = await fetch('/api/users');
            const users = await res.json();
            const select = document.getElementById('user-select');
            select.innerHTML = '<option value="">-- Select a user --</option>';
            users.forEach(u => {
                const option = document.createElement('option');
                option.value = u.user_id;
                option.textContent = `${u.username} (${u.user_type})`;
                select.appendChild(option);
            });
        } catch (err) {
            console.error('Failed to load users:', err);
        }
    }

    function selectUser() {
        const select = document.getElementById('user-select');
        selectedUser = select.value;
        const username = select.options[select.selectedIndex].text;
        if (selectedUser) {
            localStorage.setItem('selected_user_id', selectedUser);
            localStorage.setItem('selected_username', username);
            document.getElementById('user-status').textContent 
                = `Active user: ${username}`;
        }
    }

    async function seedDatabase() {
        const statusEl = document.getElementById('seed-status');
        statusEl.textContent = 'Seeding database...';
        statusEl.className = 'status';
        try {
            const res = await fetch('/api/seed', { method: 'POST' });
            const data = await res.json();
            statusEl.textContent = data.message || 'Done!';
            loadUsers(); // refresh user dropdown after seed
        } catch (err) {
            statusEl.textContent = 'Error seeding database.';
            statusEl.className = 'status error';
        }
    }

    // Run on page load
    loadUsers();
</script>

</body>
</html>
